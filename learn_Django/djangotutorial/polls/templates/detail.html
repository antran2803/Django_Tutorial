<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Detail App</title>
</head>
<body class = "bg-gray-100 p-10">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-md shadow ">
        <h1 class="text-2xl font-bold mb-4">{{info.title}} </h1>       
        <p class = "text-sm text-gray-600">{{info.message}}</p>
        <p class = "text-sm text-gray-600">{{info.time}}</p>
        <div class = "mt-2 text-gray-800" >
        Status:
            {%if info.status == True %}  
                    <span class="text-green-800">Active</span>
            {%else%}
                    <span class="text-red-800">Inactive</span>
            {% endif %}
                </div>
        </div>
        <a href="{%url 'home' %}" class="inline-block mt-4 px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">Back to Home</a>
    </div>
</body>
</html>
