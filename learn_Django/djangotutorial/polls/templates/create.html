<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <h1 class="text-2xl font-bold mb-4">Create New Poll</h1>
    <div class="max-w-md mx-auto">
    <form method="POST">
        <!-- CỰC KỲ QUAN TRỌNG: Token bảo mật bắt buộc của Django -->
        {% csrf_token %}
        <input type="text" name="title" placeholder="Title" required class="w-full px-3 py-2 mb-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        <textarea name="message" placeholder="Message" required class="w-full px-3 py-2 mb-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        <input type="date" name="time" required class="w-full px-3 py-2 mb-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        <label class="flex items-center mb-2">
            <input type="checkbox" name="status" class="mr-2">
            Click to Active
        </label>
        <button type="submit">Lưu Poll mới</button>
    </form>
    <button class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600" onclick="window.location.href=`{% url 'home' %}`">Back to Home</button>
    </div>
    
</body>
</html>
